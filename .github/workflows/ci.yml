name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================
  # Backend: typecheck + Vitest (with real Postgres + Redis service
  # containers, since integration.test.ts boots the full Express
  # stack against real Prisma per engineering.md Rule 6).
  # =============================================================
  backend:
    name: Backend (typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: govcon_user
          POSTGRES_PASSWORD: govcon_pass
          POSTGRES_DB: govcon_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U govcon_user -d govcon_platform_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://govcon_user:govcon_pass@localhost:5432/govcon_platform_test
      REDIS_URL: redis://localhost:6379
      # Test JWT secret — must be 32+ chars per config.ts production guard,
      # but NODE_ENV=test relaxes that. Still using a long value for safety.
      JWT_SECRET: ci_test_secret_do_not_use_in_production_minimum_32_chars
      NODE_ENV: test
      LOG_LEVEL: error
      # Stub external API keys — tests should not hit live providers.
      STRIPE_SECRET_KEY: sk_test_ci_stub
      STRIPE_WEBHOOK_SECRET: whsec_ci_stub
      ANTHROPIC_API_KEY: ci_stub_key
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Push schema to test database
        working-directory: backend
        run: npx prisma db push --accept-data-loss --skip-generate

      - name: TypeScript typecheck
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run Vitest
        working-directory: backend
        run: npm test

  # =============================================================
  # Frontend: typecheck + Vitest + production build.
  # No service containers needed — frontend tests use mocks/MSW.
  # =============================================================
  frontend:
    name: Frontend (typecheck + tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Production build needs these set or Vite warns. Stub values are
      # fine for the build to succeed; runtime values come from the host
      # at deploy time via .env.prod.
      VITE_API_URL: http://localhost:3001
      VITE_STRIPE_PUBLISHABLE_KEY: pk_test_ci_stub
      VITE_STRIPE_PRICING_TABLE_ID: prctbl_ci_stub

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # Use install rather than ci because the lockfile is currently
        # out of sync with package.json (esbuild 0.28 drift). Once the
        # lockfile is regenerated this can become `npm ci`.
        run: npm install --no-audit --no-fund

      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run Vitest
        working-directory: frontend
        run: npm test

      - name: Production build
        working-directory: frontend
        run: npm run build
