services:

  # ----------------------------
  # PostgreSQL Database
  # ----------------------------
  postgres:
    image: postgres:16-alpine
    container_name: govcon_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-govcon_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-govcon_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-govcon_prod} -d ${POSTGRES_DB:-govcon_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------
  # Redis Cache + Queue
  # ----------------------------
  redis:
    image: redis:7-alpine
    container_name: govcon_redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------
  # Backend API (Production)
  # ----------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: govcon_backend
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-govcon_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-govcon_platform}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      # Persistent application logs — Winston writes app.log + error.log
      # to /app/logs with 10MB × 10-file rotation (utils/logger.ts). Without
      # this volume, every `docker compose up -d --build` wipes the logs
      # and any post-incident forensics is impossible. ComplianceLog rows
      # in Postgres remain authoritative for state transitions; this
      # captures the surrounding application context (errors, external API
      # calls, request IDs) for FAR/DFARS audit support.
      - backend_logs:/app/logs
      # Mount BigQuery service-account credentials read-only.
      # The host file lives at /opt/govcon/app/adc.json and must contain a
      # JSON key for a service account with BigQuery Data Editor +
      # BigQuery Job User roles on project ${GCP_PROJECT_ID}.
      - ./adc.json:/app/adc.json:ro
    ports:
      - "127.0.0.1:3001:3001"
    command: sh -c "npx prisma migrate deploy 2>/dev/null; npx prisma db push --accept-data-loss 2>/dev/null; npx prisma generate && node dist/server.js"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # ----------------------------
  # Frontend (Production — nginx)
  # ----------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://mrgovcon.co}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
        VITE_STRIPE_PRICING_TABLE_ID: ${VITE_STRIPE_PRICING_TABLE_ID:-}
    container_name: govcon_frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    healthcheck:
      # Probe 127.0.0.1 directly, not "localhost". BusyBox wget on Alpine
      # tries IPv6 first when given a hostname; nginx in this image listens
      # IPv4-only (our nginx.conf has `listen 80;` without `listen [::]:80;`)
      # so a localhost probe gets ECONNREFUSED on ::1 without falling back.
      # Using -T 5 for connect timeout (BusyBox flag, not GNU --tries).
      test: ["CMD-SHELL", "wget -q -T 5 -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ----------------------------
  # Caddy — SSL + Reverse Proxy
  # ----------------------------
  caddy:
    image: caddy:2-alpine
    container_name: govcon_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  backend_logs:
  caddy_data:
  caddy_config:
