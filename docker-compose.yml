version: "3.9"

services:

  # ----------------------------
  # PostgreSQL Database
  # ----------------------------
  postgres:
    image: postgres:16-alpine
    container_name: govcon_postgres
    environment:
      POSTGRES_USER: govcon_user
      POSTGRES_PASSWORD: govcon_pass
      POSTGRES_DB: govcon_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govcon_user -d govcon_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------
  # Redis Cache + Queue
  # ----------------------------
  redis:
    image: redis:7-alpine
    container_name: govcon_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------
  # Backend API (Stable Build)
  # ----------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: govcon_backend

    env_file:
      - ./backend/.env

    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://govcon_user:govcon_pass@postgres:5432/govcon_platform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
      LOCALAI_BASE_URL: http://ollama:11434/v1
      LOCALAI_MODEL: mistral:7b-instruct
      GOOGLE_APPLICATION_CREDENTIALS: /app/adc.json
      GCP_PROJECT_ID: gov-con-491005
      BQ_DATASET: govcon_analytics
      # State portal credentials — fill in .env then uncomment:
      PORTAL_CA_USER: ${PORTAL_CA_USER:-}
      PORTAL_CA_PASS: ${PORTAL_CA_PASS:-}
      PORTAL_FL_USER: ${PORTAL_FL_USER:-}
      PORTAL_FL_PASS: ${PORTAL_FL_PASS:-}
      PORTAL_MD_USER: ${PORTAL_MD_USER:-}
      PORTAL_MD_PASS: ${PORTAL_MD_PASS:-}
      PORTAL_PA_USER: ${PORTAL_PA_USER:-}
      PORTAL_PA_PASS: ${PORTAL_PA_PASS:-}

    ports:
      - "3001:3001"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - uploads_data:/app/uploads
      # Mount GCP credentials if needed:
      # - /path/to/adc.json:/app/adc.json:ro
    command: sh -c "npx prisma generate && node dist/server.js"

  # ----------------------------
  # Frontend (Vite Dev)
  # ----------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: govcon_frontend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  # ----------------------------
  # Ollama — Self-Hosted LLM Engine
  # Best models for business/proposal work:
  #   mistral:7b-instruct  — 4.1 GB  (default, great balance of speed + quality)
  #   llama3.1:8b          — 4.7 GB  (128k context, stronger reasoning)
  #   phi4:14b             — 9.1 GB  (Microsoft's model, exceptional at analysis)
  #   qwen2.5:14b          — 9.0 GB  (excellent at structured writing)
  #
  # Pull a model:  docker exec govcon_ollama ollama pull mistral:7b-instruct
  # Switch model:  Update LOCALAI_MODEL above, or change in Settings → AI Provider
  # ----------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: govcon_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Uncomment for NVIDIA GPU support (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 20s

  # ----------------------------
  # Ollama Model Initializer
  # Pulls mistral:7b-instruct on first startup (~4.1 GB download).
  # This runs once and exits — safe to re-run, pull is idempotent.
  # ----------------------------
  ollama-init:
    image: ollama/ollama:latest
    container_name: govcon_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "mistral:7b-instruct"]
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  ollama_models:
  uploads_data:
